name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: api · lint + typecheck + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: papyrus
          POSTGRES_PASSWORD: papyrus
          POSTGRES_DB: papyrus_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U papyrus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      PAPYRUS_ENV: test
      DATABASE_URL: postgresql+asyncpg://papyrus:papyrus@localhost:5432/papyrus_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_SECRET: ci-only-secret
      S3_ENDPOINT_URL: http://localhost:4566
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_BUCKET_UPLOADS: papyrus-uploads
      S3_BUCKET_OUTPUTS: papyrus-outputs
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --all-packages --all-groups --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy apps/api/src
      - run: uv run --package papyrus-api pytest apps/api/tests --cov=papyrus_api --cov-report=xml

  web:
    name: web · lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run --filter @papyrus/web test
      - run: bun run build
