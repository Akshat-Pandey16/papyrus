<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1018" />
    <meta name="description" content="A free, private, self-hostable PDF toolkit. Drop a file, run a tool, leave — no signup." />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#e1466a" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Papyrus" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Papyrus</title>
  </head>
  <body>
    <script>
      (() => {
        try {
          const raw = localStorage.getItem("papyrus.ui.v1");
          let theme = "dark";
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed?.state?.theme) theme = parsed.state.theme;
          }
          const resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          if (resolved === "dark") document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = resolved;
          const tc = document.querySelector('meta[name="theme-color"]');
          if (tc) tc.setAttribute("content", resolved === "dark" ? "#1c1018" : "#fbeff0");
        } catch {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
